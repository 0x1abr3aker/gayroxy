name: Validate proxy.sh

on:
  push:
    branches: [main, master]
    paths:
      - 'proxy.sh'
      - '.github/workflows/validate.yml'
      - 'templates/*'
  pull_request:
    branches: [main, master]
    paths:
      - 'proxy.sh'
      - '.github/workflows/validate.yml'
      - 'templates/*'

jobs:
  syntax-check:
    name: Bash Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check script is executable
        run: |
          if [[ ! -x proxy.sh ]]; then
            echo "::error::proxy.sh is not executable. Run: chmod +x proxy.sh"
            exit 1
          fi
          echo "✅ proxy.sh is executable"

      - name: Bash Syntax Check
        run: |
          bash -n proxy.sh
          echo "✅ Bash syntax is valid"

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck --severity=warning proxy.sh || true
          echo "✅ ShellCheck completed"

  template-validation:
    name: Validate envsubst Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Xray config template renders as valid JSON
        run: |
          export XRAY_LOG=/tmp/test.log \
            PORT_VLESS=10001 UUID_VLESS=test-uuid PATH_VLESS=/vless \
            PORT_TROJAN=10002 TROJAN_PASS=test-pass PATH_TROJAN=/trojan \
            PORT_VMESS=10003 UUID_VMESS=test-vmess PATH_VMESS=/vmess \
            PORT_VLESS_GRPC=10005 UUID_VLESS_GRPC=test-grpc GRPC_SERVICE_VLESS=svc1 \
            PORT_TROJAN_GRPC=10006 GRPC_SERVICE_TROJAN=svc2 \
            PORT_SHADOWSOCKS=10007 SS_PASS=sspass \
            PORT_REALITY=10008 UUID_REALITY=test-reality REALITY_PRIVATE=priv REALITY_PUBLIC=pub SHORT_ID=abcd \
            PORT_SOCKS5=10009 PORT_HTTP_PROXY=10010 \
            PORT_SS_WS=10011 PORT_SS_GRPC=10012 PORT_VMESS_GRPC=10013 \
            PATH_SS_WS=/ss-ws PATH_SS_GRPC=/ss-grpc PATH_VMESS_GRPC=/vmess-grpc \
            GRPC_SERVICE_SS=ss-svc GRPC_SERVICE_VMESS=vmess-svc \
            PORT_VLESS_HU=10014 PORT_TROJAN_HU=10015 PORT_VMESS_HU=10016 \
            PATH_VLESS_HU=/vless-hu PATH_TROJAN_HU=/trojan-hu PATH_VMESS_HU=/vmess-hu
          envsubst < templates/config.json.tmpl | python3 -m json.tool > /dev/null
          echo "✅ xray template renders valid JSON"

      - name: Test nginx config template preserves nginx variables
        run: |
          export XRAY_DIR=/tmp LOG_DIR=/tmp PORT_NGINX=9000 SUB_DIR=/tmp/sub \
            PATH_VLESS=/vless PATH_TROJAN=/trojan PATH_VMESS=/vmess \
            PATH_VLESS_GRPC=/vless-grpc PATH_TROJAN_GRPC=/trojan-grpc \
            PATH_SS_WS=/ss-ws PATH_SS_GRPC=/ss-grpc PATH_VMESS_GRPC=/vmess-grpc \
            PATH_VLESS_HU=/vless-hu PATH_TROJAN_HU=/trojan-hu PATH_VMESS_HU=/vmess-hu \
            PORT_VLESS=10001 PORT_TROJAN=10002 PORT_VMESS=10003 \
            PORT_VLESS_GRPC=10005 PORT_TROJAN_GRPC=10006 \
            PORT_SS_WS=10011 PORT_SS_GRPC=10012 PORT_VMESS_GRPC=10013 \
            PORT_VLESS_HU=10014 PORT_TROJAN_HU=10015 PORT_VMESS_HU=10016
          NGINX_VARS='$XRAY_DIR $LOG_DIR $PORT_NGINX $SUB_DIR $PATH_VLESS $PORT_VLESS $PATH_TROJAN $PORT_TROJAN $PATH_VMESS $PORT_VMESS $PATH_VLESS_GRPC $PORT_VLESS_GRPC $PATH_TROJAN_GRPC $PORT_TROJAN_GRPC $PATH_SS_WS $PORT_SS_WS $PATH_SS_GRPC $PORT_SS_GRPC $PATH_VMESS_GRPC $PORT_VMESS_GRPC $PATH_VLESS_HU $PORT_VLESS_HU $PATH_TROJAN_HU $PORT_TROJAN_HU $PATH_VMESS_HU $PORT_VMESS_HU'
          OUTPUT=$(envsubst "$NGINX_VARS" < templates/nginx.conf.tmpl)
          echo "$OUTPUT" | grep -q '\$http_upgrade' && echo "✅ nginx $http_upgrade preserved"
          echo "$OUTPUT" | grep -q '\$connection_upgrade' && echo "✅ nginx $connection_upgrade preserved"
          echo "$OUTPUT" | grep -q '\$host' && echo "✅ nginx $host preserved"
          echo "$OUTPUT" | grep -q '\$remote_addr' && echo "✅ nginx $remote_addr preserved"
          echo "$OUTPUT" | grep -q '\$uri' && echo "✅ nginx $uri preserved"
          echo "$OUTPUT" | grep -q 'grpc_pass' && echo "✅ gRPC locations present"

      - name: Test HTML templates render
        run: |
          export DOMAIN=test.example.com
          envsubst '$DOMAIN' < templates/index.html.tmpl | grep -q "$DOMAIN"
          echo "✅ index.html template renders"
          # Panel needs all vars
          export DOMAIN=test.example.com SUB_B64=dGVzdA== VLESS_URL=vless://test TROJAN_URL=trojan://test VMESS_URL=vmess://test VLESS_GRPC_URL=vless+grpc TROJAN_GRPC_URL=trojan+grpc SS_URL=ss://test REALITY_URL=vless+reality SOCKS5_URL=socks5://test HTTP_URL=http://test UUID_VLESS=uid1 PATH_VLESS=/p1 TROJAN_PASS=pass123 PATH_TROJAN=/p2 UUID_VMESS=uid2 PATH_VMESS=/p3 UUID_VLESS_GRPC=uid3 GRPC_SERVICE_VLESS=svc1 GRPC_SERVICE_TROJAN=svc2 SS_PASS=secret PORT_SHADOWSOCKS=10007 UUID_REALITY=uid4 REALITY_PUBLIC=pub PORT_REALITY=10008 PORT_SOCKS5=10009 PORT_HTTP_PROXY=10010 SS_WS_URL=ss+ws://test SS_GRPC_URL=ss+grpc://test VMESS_GRPC_URL=vmess+grpc://test PATH_SS_WS=/ss-ws PATH_SS_GRPC=/ss-grpc PATH_VMESS_GRPC=/vmess-grpc GRPC_SERVICE_SS=ss-svc GRPC_SERVICE_VMESS=vmess-svc PORT_SS_WS=10011 PORT_SS_GRPC=10012 PORT_VMESS_GRPC=10013 SERVER_IP=1.2.3.4 REALITY_DIRECT_URL=vless+reality+direct VLESS_HU_URL=vless+hu://test TROJAN_HU_URL=trojan+hu://test VMESS_HU_URL=vmess+hu://test PATH_VLESS_HU=/vless-hu PATH_TROJAN_HU=/trojan-hu PATH_VMESS_HU=/vmess-hu PORT_VLESS_HU=10014 PORT_TROJAN_HU=10015 PORT_VMESS_HU=10016
          envsubst < templates/panel.html.tmpl | grep -q "$DOMAIN"
          echo "✅ panel.html template renders"

  generate-config:
    name: Test full proxy.sh flow (credential generation + template rendering)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl unzip python3

      - name: Test help message
        run: |
          ./proxy.sh --help > /dev/null 2>&1
          echo "✅ Script accepts --help"

      - name: Verify envsubst is available
        run: |
          command -v envsubst && echo "✅ envsubst available"
