name: Validate proxy.sh

on:
  push:
    branches: [main, master]
    paths:
      - 'proxy.sh'
      - '.github/workflows/validate.yml'
      - 'config.json'
  pull_request:
    branches: [main, master]
    paths:
      - 'proxy.sh'
      - '.github/workflows/validate.yml'
      - 'config.json'

jobs:
  syntax-check:
    name: Bash Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check script is executable
        run: |
          if [[ ! -x proxy.sh ]]; then
            echo "::error::proxy.sh is not executable. Run: chmod +x proxy.sh"
            exit 1
          fi
          echo "✅ proxy.sh is executable"

      - name: Bash Syntax Check
        run: |
          bash -n proxy.sh
          echo "✅ Bash syntax is valid"

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck --severity=warning proxy.sh || true
          echo "✅ ShellCheck completed"

  generate-config:
    name: Test Config Generation (no ngrok)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq curl unzip python3

      - name: Test Xray config generation
        run: |
          # Create a minimal test that runs the credential generation
          # and checks if the Xray config file is valid JSON
          export NGROK_AUTHTOKEN="test_dummy_token_for_validation_only"

          # We can't start ngrok for real, but we can source the script
          # to check the core logic by running it in a way that it creates
          # the config but we intercept before it starts ngrok.

          # Instead, just test the syntax was already done. Let's test xray download.
          ./proxy.sh --help > /dev/null 2>&1 && echo "✅ Script accepts --help"

      - name: Dry run - download Xray and test key generation
        run: |
          # Set dummy token so the script doesn't fail early on token check
          export NGROK_AUTHTOKEN="dummy_123"

          # Run the script - it will fail at ngrok but should create xray, config, etc.
          # Use timeout to prevent it hanging.
          timeout 60 bash -c './proxy.sh' || EXIT=$?

          # timeout returns 124 if it killed the process, which is expected
          if [[ ${EXIT:-0} -eq 124 ]]; then
            echo "✅ Script ran for 60s without crashing (expected - waiting on ngrok)"
          elif [[ ${EXIT:-0} -eq 0 ]]; then
            echo "✅ Script completed"
          else
            echo "ℹ️ Script exited with code ${EXIT:-0} (may be expected in CI without real token)"
          fi

          # Check generated files
          if [[ -f xray ]]; then
            echo "✅ xray binary downloaded"
            ./xray version 2>/dev/null || true
          fi

          if [[ -f config.json ]]; then
            echo "✅ config.json generated"
            if python3 -m json.tool config.json > /dev/null 2>&1; then
              echo "✅ config.json is valid JSON"
            else
              echo "::error::config.json is not valid JSON"
              cat config.json
              exit 1
            fi

            # Validate essential fields
            if grep -q "vless" config.json; then
              echo "✅ config.json contains VLESS settings"
            fi
            if grep -q "vmess" config.json; then
              echo "✅ config.json contains VMess settings"
            fi
            if grep -q "trojan" config.json; then
              echo "✅ config.json contains Trojan settings"
            fi
            if grep -q "reality" config.json; then
              echo "✅ config.json contains Reality settings"
            fi
            if grep -q "wsSettings" config.json; then
              echo "✅ config.json contains WebSocket settings"
            fi
          else
            echo "⚠️ config.json not found (script may have failed before generation)"
          fi