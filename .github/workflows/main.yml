name: Deploy Proxy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: proxy-deploy
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔴 Close other actions
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "::group::Cancelling other runs..."
          gh run list --workflow "${{ github.workflow }}" --json databaseId,status \
            --jq '.[] | select(.status != "completed") | .databaseId' \
            | while read -r id; do
              [[ "$id" != "${{ github.run_id }}" ]] && gh run cancel "$id" 2>/dev/null || true
            done
          echo "Done."
          echo "::endgroup::"

      - name: Make script executable
        run: chmod +x proxy.sh

      - name: ▶️ Run proxy
        id: proxy
        env:
          CF_DOMAIN: ${{ secrets.CF_DOMAIN }}
          CF_AUTHTOKEN: ${{ secrets.CF_AUTHTOKEN }}
        run: |
          mkdir -p logs
          echo "::group::Proxy Output"
          ./proxy.sh 2>&1 | tee logs/run.log
          echo "::endgroup::"

      - name: 📤 Push logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-logs
          path: |
            logs/
            sub/*.html
            sub/subscription.b64
          if-no-files-found: ignore
          retention-days: 7

      - name: 🔄 Re-run (keep alive)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DURATION=$(( $(date +%s) - $(date -d "${{ github.run_started_at }}" +%s) ))
          if [[ $DURATION -lt 30 ]]; then
            echo "Run lasted ${DURATION}s — too short (likely failure). Skipping re-trigger."
            exit 0
          fi

          echo "::group::Dispatching next run..."
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" 2>/dev/null || true
          echo "Sleeping 40s to let the runner pick it up..."
          sleep 40
          echo "::endgroup::"

          # Check if new run is stuck queued (no runner picked it up)
          echo "::group::Checking queue status..."
          NEXT=$(gh run list --workflow "${{ github.workflow }}" --branch "${{ github.ref }}" \
            --json databaseId,status --jq '.[] | select(.databaseId != '${{ github.run_id }}' and .status != "completed") | "\(.databaseId)|\(.status)"' | head -1)

          if [[ -z "$NEXT" ]]; then
            echo "No new run found — dispatching again..."
            gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" 2>/dev/null || true
          else
            ID="${NEXT%%|*}"
            STATUS="${NEXT##*|}"
            echo "Run #$ID status: $STATUS"
            if [[ "$STATUS" == "queued" || "$STATUS" == "pending" || "$STATUS" == "waiting" ]]; then
              echo "Run #$ID stuck in '$STATUS' — cancelling and re-dispatching..."
              gh run cancel "$ID" 2>/dev/null || true
              sleep 2
              gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" 2>/dev/null || true
            else
              echo "Run #$ID is $STATUS — good!"
            fi
          fi
          echo "::endgroup::"
