name: Deploy Proxy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x proxy.sh

      - name: Run proxy.sh
        id: proxy
        env:
          CF_DOMAIN: ${{ secrets.CF_DOMAIN }}
          CF_AUTHTOKEN: ${{ secrets.CF_AUTHTOKEN }}
        run: |
          echo "::group::Proxy Output"
          ./proxy.sh
          echo "::endgroup::"

      - name: Re-trigger (keep alive)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}" 2>/dev/null || true
